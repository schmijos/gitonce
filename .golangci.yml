version: "2"

linters:
  default: standard
  enable:
    - staticcheck
  settings:
    errcheck:
      exclude-functions:
        # bytes.Buffer writes never return errors
        - (*bytes.Buffer).Write
        - (*bytes.Buffer).WriteByte
        - (*bytes.Buffer).WriteString
        # encoding/binary writes to bytes.Buffer never return errors
        - encoding/binary.Write
        # http.ResponseWriter writes are not actionable mid-response
        - (net/http.ResponseWriter).Write
        # io.Closer.Close in defer — standard Go idiom; errors not actionable
        - (io.ReadCloser).Close
        - (io.Closer).Close
        - (*os.File).Close
  exclusions:
    rules:
      # io.Writer passed to writeSideband — errors not actionable mid-stream
      - path: git\.go
        linters: [errcheck]
        text: "w\\.Write"
      # Test helpers: zip/multipart writes are not critical
      - path: _test\.go
        linters: [errcheck]
